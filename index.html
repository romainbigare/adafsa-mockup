<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Map My Crop — Farms Overview</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="assets/tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin=""/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin=""/>
<link rel="stylesheet" href="assets/css/tokens.css"/>
<link rel="stylesheet" href="assets/css/base.css"/>
<link rel="stylesheet" href="assets/css/components.css"/>
<link rel="stylesheet" href="assets/css/leaflet.css"/>
</head>
<body class="antialiased h-screen overflow-hidden flex flex-col font-sans bg-gray-50">

<div class="flex-1 flex overflow-hidden w-full relative min-h-0">

  <!-- Side Nav: Overview + the six contract modules + Farm Analysis -->
  <aside id="sidebar" data-page="overview" class="hidden md:flex flex-col bg-gray-50 border-r border-gray-200 w-60 py-6 flex-none"></aside>

  <!-- Main Content -->
  <main class="flex-1 relative overflow-hidden h-full">

    <!-- The single, persistent Leaflet map (shown only on module routes) -->
    <div id="map" class="absolute inset-0 z-0 h-full w-full"></div>

    <!-- Loading overlay -->
    <div id="map-loader" class="absolute inset-0 z-[5] flex items-center justify-center bg-gray-900/40 backdrop-blur-sm pointer-events-none">
      <div class="glass-panel px-6 py-4 flex flex-col items-center gap-3">
        <div class="w-8 h-8 border-3 border-brand-200 border-t-brand-600 rounded-full animate-spin"></div>
        <p class="font-data-sm text-gray-600">Loading farm features...</p>
      </div>
    </div>

    <!-- ===================== MODULE CHROME (module routes) ==================== -->
    <div id="module-chrome" class="route-hidden absolute inset-0 z-10 pointer-events-none">

      <!-- KPI strip -->
      <div id="kpi-strip" class="kpi-strip pointer-events-auto"></div>

      <!-- Legend (left) -->
      <div id="module-legend" class="glass-panel pointer-events-auto absolute left-5 z-20" style="top:84px;width:250px"></div>

      <!-- Map controls (right) -->
      <div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-2 z-20 hidden md:flex pointer-events-auto">
        <button id="zoom-in" class="glass-panel w-10 h-10 flex items-center justify-center text-gray-700 hover:bg-gray-100 transition-all hover:scale-105 active:scale-95" title="Zoom in"><span class="material-symbols-outlined">add</span></button>
        <button id="zoom-out" class="glass-panel w-10 h-10 flex items-center justify-center text-gray-700 hover:bg-gray-100 transition-all hover:scale-105 active:scale-95" title="Zoom out"><span class="material-symbols-outlined">remove</span></button>
        <button id="locate-me" class="glass-panel w-10 h-10 flex items-center justify-center text-gray-700 hover:bg-gray-100 transition-all hover:scale-105 active:scale-95 mt-4" title="Recenter"><span class="material-symbols-outlined">my_location</span></button>
        <button id="toggle-basemap" class="glass-panel w-10 h-10 flex items-center justify-center text-gray-700 hover:bg-gray-100 transition-all hover:scale-105 active:scale-95" title="Switch basemap"><span class="material-symbols-outlined">satellite_alt</span></button>
      </div>

      <!-- Bottom sheet — Attention list + Band summary -->
      <div id="module-bar" class="live-bar absolute bottom-3 left-3 right-3 z-30 glass-panel pointer-events-auto rounded-lg flex flex-col">
        <div class="flex items-center justify-between pl-2 pr-3 border-b border-gray-200">
          <div class="flex items-center overflow-x-auto overflow-y-hidden scroll-thin">
            <button class="mp-tab flex items-center gap-1.5 px-3 py-2 font-label-caps text-gray-500 hover:text-gray-900 transition-colors whitespace-nowrap" data-mp-tab="attention">
              <span class="material-symbols-outlined" style="font-size:16px;">priority_high</span><span>ATTENTION LIST</span>
            </button>
            <button class="mp-tab flex items-center gap-1.5 px-3 py-2 font-label-caps text-gray-500 hover:text-gray-900 transition-colors whitespace-nowrap" data-mp-tab="summary">
              <span class="material-symbols-outlined" style="font-size:16px;">insights</span><span>BAND SUMMARY</span>
            </button>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <div class="mp-ctx-attention flex items-center gap-2">
              <div class="relative">
                <button id="mp-att-columns-btn" class="flex items-center gap-1 px-2.5 py-1 text-xs border border-gray-300 rounded-lg bg-white hover:bg-gray-100 transition-colors text-gray-700"><span class="material-symbols-outlined" style="font-size:15px;">view_column</span><span class="hidden sm:inline">Columns</span></button>
                <div id="mp-att-columns-menu" class="hidden absolute right-0 bottom-full mb-1 w-52 max-h-72 overflow-y-auto scroll-thin bg-white border border-gray-200 rounded-lg shadow-lg z-50 p-2"></div>
              </div>
              <button id="mp-att-export-btn" class="flex items-center gap-1 px-2.5 py-1 text-xs bg-brand-600 text-white rounded-lg hover:bg-brand-700 transition-colors"><span class="material-symbols-outlined" style="font-size:15px;">download</span><span class="hidden sm:inline">Export CSV</span></button>
            </div>
            <div class="mp-ctx-summary hidden flex items-center gap-2">
              <div class="relative">
                <button id="mp-sum-columns-btn" class="flex items-center gap-1 px-2.5 py-1 text-xs border border-gray-300 rounded-lg bg-white hover:bg-gray-100 transition-colors text-gray-700"><span class="material-symbols-outlined" style="font-size:15px;">view_column</span><span class="hidden sm:inline">Columns</span></button>
                <div id="mp-sum-columns-menu" class="hidden absolute right-0 bottom-full mb-1 w-52 max-h-72 overflow-y-auto scroll-thin bg-white border border-gray-200 rounded-lg shadow-lg z-50 p-2"></div>
              </div>
              <button id="mp-sum-export-btn" class="flex items-center gap-1 px-2.5 py-1 text-xs bg-brand-600 text-white rounded-lg hover:bg-brand-700 transition-colors"><span class="material-symbols-outlined" style="font-size:15px;">download</span><span class="hidden sm:inline">Export CSV</span></button>
            </div>
            <button id="module-bar-collapse" class="text-gray-400 hover:text-gray-700 pl-1" title="Collapse"><span class="material-symbols-outlined" id="module-bar-chevron" style="font-size:18px;">expand_more</span></button>
          </div>
        </div>
        <div class="mp-panel lb-panel overflow-auto scroll-thin rounded-b-lg" data-mp-panel="attention">
          <table class="farm-table w-full text-left border-collapse"><thead class="bg-gray-100/95 sticky top-0 z-10"><tr id="mp-att-thead"></tr></thead><tbody id="mp-att-tbody"></tbody></table>
        </div>
        <div class="mp-panel lb-panel hidden overflow-auto scroll-thin rounded-b-lg" data-mp-panel="summary">
          <table class="farm-table w-full text-left border-collapse"><thead class="bg-gray-100/95 sticky top-0 z-10"><tr id="mp-sum-thead"></tr></thead><tbody id="mp-sum-tbody"></tbody></table>
        </div>
      </div>
    </div>

    <!-- ===================== HOME SCORECARD (overview route) ================== -->
    <div id="route-overview" class="route-hidden absolute inset-0 z-20 bg-gray-50 overflow-y-auto scroll-thin">
      <div class="max-w-6xl mx-auto px-8 py-8">
        <h1 class="text-2xl font-bold text-gray-900">Region scorecard</h1>
        <p id="overview-meta" class="text-sm text-gray-500 mt-1 font-mono">—</p>
        <div id="overview-cards" class="grid gap-4 mt-6" style="grid-template-columns:repeat(auto-fill,minmax(250px,1fr))"></div>
        <p class="text-xs text-gray-400 mt-6">Each card: headline number · status · band mix. Click a card to open that module's map, legend and attention list.</p>
      </div>
    </div>

  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
<script src="js/namespace.js"></script>
<script src="js/config.js"></script>
<script src="js/lib/geo.js"></script>
<script src="js/lib/color.js"></script>
<script src="js/lib/random.js"></script>
<script src="js/data/loader.js"></script>
<script src="js/map/createMap.js"></script>
<script src="js/ui/sidebar.js"></script>
<script src="js/ui/mapControls.js"></script>
<script src="data/plots.js"></script>
<script src="js/mock/metrics.js"></script>
<script src="js/dashboard/taxonomy.js"></script>
<script src="js/dashboard/state.js"></script>
<script src="js/dashboard/modules.js"></script>
<script src="js/dashboard/moduleRegistry.js"></script>
<script src="js/dashboard/plotsLayer.js"></script>
<script src="js/dashboard/dataTable.js"></script>
<script src="js/dashboard/attentionList.js"></script>
<script src="js/dashboard/scorecard.js"></script>
<script src="js/dashboard/modulePage.js"></script>
<script src="js/pages/overview.js"></script>
<script src="js/dashboard/router.js"></script>
<script src="js/pages/dashboard.js"></script>
</body>
</html>
