<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect x="0" y="0" width="1600" height="900" fill="#FAF9F6"/>
  <g transform="translate(430,0)">

  <!-- ============ BAND 1 ============ -->
  <circle cx="218" cy="180" r="38" fill="#EAF3EC"/>
  <path d="M 196 180 Q 218 165 240 180 Q 218 195 196 180 Z" fill="none" stroke="#166534" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="218" cy="180" r="6" fill="#166534"/>

  <text x="280" y="158" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">Altitude 1 — the situation</text>
  <text x="280" y="188" font-family="Helvetica, Arial, sans-serif" font-size="21" font-style="italic" fill="#166534">&#8220;Is anything wrong today?&#8221;</text>
  <text x="280" y="214" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6B7280">A quick look, first thing in the morning.</text>

  <!-- connector 1 -->
  <line x1="218" y1="280" x2="218" y2="350" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="240" y="320" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6B7280">one click</text>

  <!-- ============ BAND 2 ============ -->
  <circle cx="218" cy="450" r="38" fill="#EAF3EC"/>
  <circle cx="196" cy="437" r="3" fill="#166534"/>
  <line x1="204" y1="437" x2="236" y2="437" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
  <circle cx="196" cy="450" r="3" fill="#166534"/>
  <line x1="204" y1="450" x2="228" y2="450" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
  <circle cx="196" cy="463" r="3" fill="#166534"/>
  <line x1="204" y1="463" x2="220" y2="463" stroke="#166534" stroke-width="3" stroke-linecap="round"/>

  <text x="280" y="428" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">Altitude 2 — the question</text>
  <text x="280" y="458" font-family="Helvetica, Arial, sans-serif" font-size="21" font-style="italic" fill="#166534">&#8220;Which farms need attention?&#8221;</text>
  <text x="280" y="484" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6B7280">A ranked list to work through during the week.</text>

  <!-- connector 2 -->
  <line x1="218" y1="550" x2="218" y2="620" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="240" y="590" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6B7280">one click</text>

  <!-- ============ BAND 3 ============ -->
  <circle cx="218" cy="720" r="38" fill="#EAF3EC"/>
  <rect x="200" y="704" width="24" height="30" rx="2" fill="#FFFFFF" stroke="#166534" stroke-width="2.5"/>
  <line x1="206" y1="712" x2="220" y2="712" stroke="#166534" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="206" y1="718" x2="220" y2="718" stroke="#166534" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="206" y1="724" x2="220" y2="724" stroke="#166534" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="227" cy="727" r="8" fill="#FFFFFF" stroke="#166534" stroke-width="3"/>
  <line x1="232.7" y1="732.7" x2="239" y2="739" stroke="#166534" stroke-width="3" stroke-linecap="round"/>

  <text x="280" y="698" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">Altitude 3 — the farm</text>
  <text x="280" y="728" font-family="Helvetica, Arial, sans-serif" font-size="21" font-style="italic" fill="#166534">&#8220;What is happening on this farm?&#8221;</text>
  <text x="280" y="754" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6B7280">The full picture, before a visit or a call.</text>
