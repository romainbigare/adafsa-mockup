    <line x1="1210" y1="177" x2="1530" y2="177" stroke="#E2E0DA" stroke-width="0.75"/>
    <line x1="1210" y1="278" x2="1530" y2="278" stroke="#E2E0DA" stroke-width="0.75"/>
    <!-- highlight: tiles row in bottom zone -->
    <rect x="1220" y="285" width="46" height="30" rx="4" fill="#DCEFDD"/>
    <rect x="1270" y="285" width="46" height="30" rx="4" fill="#DCEFDD"/>
    <rect x="1320" y="285" width="46" height="30" rx="4" fill="#DCEFDD"/>
    <rect x="1370" y="285" width="46" height="30" rx="4" fill="#FDE8CC"/>
    <rect x="1420" y="285" width="46" height="30" rx="4" fill="#DCEFDD"/>
    <rect x="1470" y="285" width="46" height="30" rx="4" fill="#DCEFDD"/>
  </g>

  <!-- Thumb 2 -->
  <text x="1158" y="360" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1F2937">Altitude 2 — KPIs + attention list</text>
  <rect x="1158" y="366" width="372" height="170" rx="8" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1.2"/>
  <g clip-path="url(#thumbClip2)">
    <rect x="1158" y="366" width="52" height="170" fill="#EEF1EC"/>
    <rect x="1210" y="366" width="320" height="25" fill="#E8F3EA"/>
    <rect x="1210" y="391" width="320" height="101" fill="#F2F1ED"/>
    <rect x="1210" y="492" width="320" height="44" fill="#F3F4F6"/>
    <line x1="1210" y1="366" x2="1210" y2="536" stroke="#E2E0DA" stroke-width="0.75"/>
    <line x1="1210" y1="391" x2="1530" y2="391" stroke="#E2E0DA" stroke-width="0.75"/>
    <line x1="1210" y1="492" x2="1530" y2="492" stroke="#E2E0DA" stroke-width="0.75"/>
    <!-- highlight: KPI chips under top bar -->
    <rect x="1235" y="399" width="60" height="14" rx="7" fill="#E8F3EA" stroke="#BFE0C4" stroke-width="1"/>
    <rect x="1305" y="399" width="60" height="14" rx="7" fill="#F3F4F6" stroke="#DADCE0" stroke-width="1"/>
    <rect x="1375" y="399" width="60" height="14" rx="7" fill="#E8F3EA" stroke="#BFE0C4" stroke-width="1"/>
    <rect x="1445" y="399" width="60" height="14" rx="7" fill="#F3F4F6" stroke="#DADCE0" stroke-width="1"/>
  </g>

  <!-- Thumb 3 -->
  <text x="1158" y="574" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1F2937">Altitude 3 — + dossier drawer</text>
  <rect x="1158" y="580" width="372" height="170" rx="8" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1.2"/>
  <g clip-path="url(#thumbClip3)">
    <rect x="1158" y="580" width="52" height="170" fill="#EEF1EC"/>
    <rect x="1210" y="580" width="320" height="25" fill="#E8F3EA"/>
    <rect x="1210" y="605" width="320" height="101" fill="#F2F1ED"/>
    <rect x="1210" y="706" width="320" height="44" fill="#F3F4F6"/>
    <line x1="1210" y1="580" x2="1210" y2="750" stroke="#E2E0DA" stroke-width="0.75"/>
    <line x1="1210" y1="605" x2="1530" y2="605" stroke="#E2E0DA" stroke-width="0.75"/>
    <line x1="1210" y1="706" x2="1530" y2="706" stroke="#E2E0DA" stroke-width="0.75"/>
    <!-- highlight: right-side drawer overlay -->
    <rect x="1400" y="580" width="130" height="170" fill="#FFFFFF" opacity="0.94" stroke="#166534" stroke-width="1.4"/>
    <rect x="1400" y="580" width="4" height="170" fill="#166534"/>
    <rect x="1414" y="600" width="102" height="6" rx="3" fill="#D9DEDA"/>
    <rect x="1414" y="618" width="90" height="6" rx="3" fill="#D9DEDA"/>
    <rect x="1414" y="636" width="96" height="6" rx="3" fill="#D9DEDA"/>
  </g>

  <text x="1344" y="780" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-style="italic" fill="#1F2937">Same places, different depth — learn it once.</text>

  <text x="48" y="860" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">Screen grammar — ADAFSA dashboard redesign</text>
</svg>
