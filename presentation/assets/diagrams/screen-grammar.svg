<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="softShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1F2937" flood-opacity="0.12"/>
    </filter>
    <clipPath id="frameClip"><rect x="48" y="130" width="860" height="620" rx="14"/></clipPath>
    <clipPath id="thumbClip1"><rect x="1158" y="152" width="372" height="170" rx="8"/></clipPath>
    <clipPath id="thumbClip2"><rect x="1158" y="366" width="372" height="170" rx="8"/></clipPath>
    <clipPath id="thumbClip3"><rect x="1158" y="580" width="372" height="170" rx="8"/></clipPath>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#FAF9F6"/>

  <text x="48" y="68" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#1F2937">One screen grammar — the furniture never moves</text>

  <!-- ============= MAIN FRAME ============= -->
  <rect x="48" y="130" width="860" height="620" rx="14" fill="#FFFFFF" filter="url(#softShadow2)"/>
  <g clip-path="url(#frameClip)">
    <rect x="48" y="130" width="120" height="620" fill="#EEF1EC"/>
    <rect x="168" y="130" width="740" height="90" fill="#E8F3EA"/>
    <rect x="168" y="220" width="740" height="370" fill="#F2F1ED"/>
    <rect x="168" y="590" width="740" height="160" fill="#F3F4F6"/>
    <line x1="168" y1="130" x2="168" y2="750" stroke="#E2E0DA" stroke-width="1"/>
    <line x1="168" y1="220" x2="908" y2="220" stroke="#E2E0DA" stroke-width="1"/>
    <line x1="168" y1="590" x2="908" y2="590" stroke="#E2E0DA" stroke-width="1"/>
  </g>
  <rect x="48" y="130" width="860" height="620" rx="14" fill="none" stroke="#E2E0DA" stroke-width="1.5"/>

  <!-- NAV rail content -->
  <text x="108" y="166" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1F2937">NAV</text>
  <rect x="100" y="230" width="16" height="16" rx="4" fill="#FFFFFF" stroke="#B9D4BC" stroke-width="1.2"/>
  <rect x="100" y="326" width="16" height="16" rx="4" fill="#FFFFFF" stroke="#B9D4BC" stroke-width="1.2"/>
  <rect x="100" y="422" width="16" height="16" rx="4" fill="#FFFFFF" stroke="#B9D4BC" stroke-width="1.2"/>
  <rect x="100" y="518" width="16" height="16" rx="4" fill="#FFFFFF" stroke="#B9D4BC" stroke-width="1.2"/>
  <rect x="100" y="614" width="16" height="16" rx="4" fill="#FFFFFF" stroke="#B9D4BC" stroke-width="1.2"/>

  <!-- VERDICT bar content -->
  <text x="192" y="180" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1F2937">VERDICT</text>
  <rect x="192" y="196" width="460" height="12" rx="6" fill="#FFFFFF" stroke="#CFE3D2" stroke-width="1.2"/>

  <!-- WORLD (map) content -->
  <text x="192" y="260" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1F2937">THE WORLD (map)</text>
  <rect x="192" y="280" width="692" height="280" rx="8" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1.2"/>
  <circle cx="300" cy="360" r="24" fill="#D73027" opacity="0.20"/>
  <circle cx="430" cy="470" r="18" fill="#D97706" opacity="0.20"/>
  <circle cx="650" cy="400" r="16" fill="#1A9850" opacity="0.16"/>
  <circle cx="760" cy="490" r="14" fill="#D97706" opacity="0.16"/>

  <!-- ANSWER band content -->
  <text x="192" y="630" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1F2937">THE ANSWER (ranked list)</text>
  <circle cx="204" cy="652" r="5" fill="#D73027"/>
  <rect x="222" y="647" width="560" height="10" rx="5" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1"/>
  <circle cx="204" cy="676" r="5" fill="#D97706"/>
  <rect x="222" y="671" width="460" height="10" rx="5" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1"/>
  <circle cx="204" cy="700" r="5" fill="#D97706"/>
  <rect x="222" y="695" width="380" height="10" rx="5" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1"/>

  <!-- ============= CALLOUTS ============= -->
  <!-- VERDICT callout -->
  <circle cx="908" cy="175" r="3" fill="#9CA3AF"/>
  <line x1="908" y1="175" x2="928" y2="175" stroke="#9CA3AF" stroke-width="1.3"/>
  <circle cx="928" cy="175" r="3" fill="#9CA3AF"/>
  <text x="936" y="172" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6B7280">
    <tspan x="936" dy="0">plain language, never</tspan>
    <tspan x="936" dy="19">truncated</tspan>
  </text>

  <!-- WORLD callout -->
  <circle cx="908" cy="405" r="3" fill="#9CA3AF"/>
  <line x1="908" y1="405" x2="928" y2="405" stroke="#9CA3AF" stroke-width="1.3"/>
  <circle cx="928" cy="405" r="3" fill="#9CA3AF"/>
  <text x="936" y="410" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6B7280">one subject at a time</text>

  <!-- ANSWER callout -->
  <circle cx="908" cy="670" r="3" fill="#9CA3AF"/>
  <line x1="908" y1="670" x2="928" y2="670" stroke="#9CA3AF" stroke-width="1.3"/>
  <circle cx="928" cy="670" r="3" fill="#9CA3AF"/>
  <text x="936" y="675" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6B7280">worst first · exportable</text>

  <!-- NAV callout (routed above the frame to avoid crossing other zones) -->
  <polyline points="108,130 108,108 916,108 916,290 928,290" fill="none" stroke="#9CA3AF" stroke-width="1.3"/>
  <circle cx="108" cy="130" r="3" fill="#9CA3AF"/>
  <circle cx="928" cy="290" r="3" fill="#9CA3AF"/>
  <text x="936" y="287" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6B7280">
    <tspan x="936" dy="0">the contract, by name —</tspan>
    <tspan x="936" dy="19">never changes meaning</tspan>
  </text>

  <!-- ============= RIGHT COLUMN: 3 MINI SKELETONS ============= -->
  <!-- Thumb 1 -->
  <text x="1158" y="146" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1F2937">Altitude 1 — verdict + tiles</text>
  <rect x="1158" y="152" width="372" height="170" rx="8" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1.2"/>
  <g clip-path="url(#thumbClip1)">
    <rect x="1158" y="152" width="52" height="170" fill="#EEF1EC"/>
    <rect x="1210" y="152" width="320" height="25" fill="#E8F3EA"/>
    <rect x="1210" y="177" width="320" height="101" fill="#F2F1ED"/>
    <rect x="1210" y="278" width="320" height="44" fill="#F3F4F6"/>
