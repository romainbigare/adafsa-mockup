<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="softShadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1F2937" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#FAF9F6"/>

  <text x="48" y="68" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#1F2937">Three altitudes — every descent trades reassurance for density</text>

  <!-- ===================== BAND 1 ===================== -->
  <g>
    <rect x="48" y="130" width="1292" height="200" rx="10" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1.5" filter="url(#softShadow)"/>
    <rect x="48" y="134" width="8" height="192" rx="4" fill="#1A9850"/>

    <!-- route chip -->
    <rect x="80" y="214" width="124" height="32" rx="16" fill="#F3F4F6" stroke="#E2E0DA" stroke-width="1"/>
    <text x="142" y="235" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="600" fill="#1F2937">#/overview</text>

    <!-- label + question -->
    <text x="254" y="222" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">ALTITUDE 1 — THE SITUATION</text>
    <text x="254" y="250" font-family="Helvetica, Arial, sans-serif" font-size="18" font-style="italic" fill="#6B7280">&#8220;Is anything red?&#8221;</text>

    <!-- description (2 lines) -->
    <text x="708" y="222" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#6B7280">
      <tspan x="708" dy="0">Verdict sentence · region map with problem glow · six</tspan>
      <tspan x="708" dy="22">calm status tiles</tspan>
    </text>

    <!-- register tag -->
    <rect x="1118" y="214" width="198" height="32" rx="16" fill="#FFFFFF" stroke="#1A9850" stroke-width="1.5"/>
    <text x="1217" y="235" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1A9850">reads like: a sentence</text>
  </g>

  <!-- gap arrow 1→2 -->
  <g>
    <line x1="90" y1="336" x2="90" y2="372" stroke="#6B7280" stroke-width="2"/>
    <polygon points="83,372 97,372 90,382" fill="#6B7280"/>
    <text x="112" y="365" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#374151">click a tile or a glowing cluster</text>
  </g>

  <!-- ===================== BAND 2 ===================== -->
  <g>
    <rect x="48" y="390" width="1292" height="200" rx="10" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1.5" filter="url(#softShadow)"/>
    <rect x="48" y="394" width="8" height="192" rx="4" fill="#166534"/>

    <!-- route chip -->
    <rect x="80" y="474" width="142" height="32" rx="16" fill="#F3F4F6" stroke="#E2E0DA" stroke-width="1"/>
    <text x="151" y="495" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="600" fill="#1F2937">#/m/&lt;module&gt;</text>

    <!-- label + question -->
    <text x="254" y="482" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">ALTITUDE 2 — THE QUESTION</text>
    <text x="254" y="510" font-family="Helvetica, Arial, sans-serif" font-size="18" font-style="italic" fill="#6B7280">&#8220;Which farms need attention, and how bad?&#8221;</text>

    <!-- description (2 lines) -->
    <text x="708" y="482" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#6B7280">
      <tspan x="708" dy="0">One module owns the map · KPI strip · dial · one</tspan>
      <tspan x="708" dy="22">legend · ranked attention list</tspan>
    </text>

    <!-- register tag -->
    <rect x="1122" y="474" width="194" height="32" rx="16" fill="#FFFFFF" stroke="#166534" stroke-width="1.5"/>
    <text x="1219" y="495" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#166534">reads like: a work list</text>
  </g>

  <!-- gap arrow 2→3 -->
  <g>
    <line x1="90" y1="596" x2="90" y2="632" stroke="#6B7280" stroke-width="2"/>
    <polygon points="83,632 97,632 90,642" fill="#6B7280"/>
    <text x="112" y="625" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#374151">click an attention row</text>
  </g>

  <!-- ===================== BAND 3 ===================== -->
  <g>
    <rect x="48" y="650" width="1292" height="200" rx="10" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1.5" filter="url(#softShadow)"/>
    <rect x="48" y="654" width="8" height="192" rx="4" fill="#6B7280"/>

    <!-- route chip -->
    <rect x="80" y="734" width="134" height="32" rx="16" fill="#F3F4F6" stroke="#E2E0DA" stroke-width="1"/>
    <text x="147" y="755" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="600" fill="#1F2937">#/farm/&lt;id&gt;</text>

    <!-- label + question -->
    <text x="254" y="742" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">ALTITUDE 3 — THE FARM</text>
    <text x="254" y="770" font-family="Helvetica, Arial, sans-serif" font-size="18" font-style="italic" fill="#6B7280">&#8220;What exactly is wrong — and what do we do?&#8221;</text>

    <!-- description (2 lines) -->
    <text x="708" y="742" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#6B7280">
      <tspan x="708" dy="0">Dossier: the AI's verdict · six-module status · actions</tspan>
      <tspan x="708" dy="22">(export · Farm Analysis)</tspan>
    </text>

    <!-- register tag -->
    <rect x="1124" y="734" width="192" height="32" rx="16" fill="#FFFFFF" stroke="#6B7280" stroke-width="1.5"/>
    <text x="1220" y="755" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#6B7280">reads like: a case file</text>
  </g>

  <!-- far right: up arrow "Back / Escape walks up" spanning all three bands -->
  <g>
    <line x1="1400" y1="850" x2="1400" y2="140" stroke="#1F2937" stroke-width="2"/>
    <polygon points="1392,140 1408,140 1400,124" fill="#1F2937"/>
    <text x="1428" y="490" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#374151" transform="rotate(-90 1428 490)">Back / Escape walks up</text>
  </g>

  <!-- far right: reassurance / density axis -->
  <g>
    <line x1="1520" y1="160" x2="1520" y2="820" stroke="#6B7280" stroke-width="1.5"/>
    <polygon points="1513,160 1527,160 1520,144" fill="#6B7280"/>
    <polygon points="1513,820 1527,820 1520,836" fill="#6B7280"/>
    <text x="1520" y="132" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#374151">reassurance</text>
    <text x="1520" y="852" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#374151">density</text>
  </g>

  <text x="48" y="880" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">Altitude model — ADAFSA dashboard redesign</text>
</svg>
