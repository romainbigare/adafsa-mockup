<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760">
  <defs>
    <filter id="softShadow5" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1F2937" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="760" fill="#FAF9F6"/>

  <text x="48" y="70" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#1F2937">Trust as architecture — two contracts, test-enforced</text>

  <line x1="850" y1="130" x2="850" y2="650" stroke="#E2E0DA" stroke-width="1"/>

  <!-- ================= LEFT: NUMBER CONTRACT ================= -->
  <text x="48" y="148" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">The number contract</text>

  <rect x="48" y="190" width="380" height="140" rx="12" fill="#FFFFFF" stroke="#166534" stroke-width="1.5" filter="url(#softShadow5)"/>
  <text x="72" y="234" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1F2937">moduleRegistry — one audited source</text>
  <text x="72" y="264" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6B7280">(every count, band, rollup, format)</text>

  <!-- fan lines to chips (box center y=260) -->
  <line x1="428" y1="260" x2="560" y2="120" stroke="#9CA3AF" stroke-width="1.2"/>
  <line x1="428" y1="260" x2="560" y2="190" stroke="#9CA3AF" stroke-width="1.2"/>
  <line x1="428" y1="260" x2="560" y2="260" stroke="#9CA3AF" stroke-width="1.2"/>
  <line x1="428" y1="260" x2="560" y2="330" stroke="#9CA3AF" stroke-width="1.2"/>
  <line x1="428" y1="260" x2="560" y2="400" stroke="#9CA3AF" stroke-width="1.2"/>
  <circle cx="428" cy="260" r="3.5" fill="#166534"/>

  <!-- chips -->
  <rect x="560" y="102" width="86" height="36" rx="18" fill="#F3F4F6" stroke="#E2E0DA" stroke-width="1"/>
  <text x="603" y="125" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Verdict</text>

  <rect x="560" y="172" width="116" height="36" rx="18" fill="#F3F4F6" stroke="#E2E0DA" stroke-width="1"/>
  <text x="618" y="195" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Status tiles</text>

  <rect x="560" y="242" width="98" height="36" rx="18" fill="#F3F4F6" stroke="#E2E0DA" stroke-width="1"/>
  <text x="609" y="265" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">KPI strip</text>

  <rect x="560" y="312" width="89" height="36" rx="18" fill="#F3F4F6" stroke="#E2E0DA" stroke-width="1"/>
  <text x="604" y="335" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Legend</text>

  <rect x="560" y="382" width="130" height="36" rx="18" fill="#F3F4F6" stroke="#E2E0DA" stroke-width="1"/>
  <text x="625" y="405" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Farm dossier</text>

  <!-- incident strip -->
  <rect x="48" y="480" width="215" height="44" rx="22" fill="#FADBD5" stroke="#D73027" stroke-width="1.3"/>
  <text x="155" y="507" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#D73027">Home: "223 farms critical"</text>

  <circle cx="295" cy="502" r="17" fill="#FADBD5" stroke="#D73027" stroke-width="1.3"/>
  <text x="295" y="508" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#D73027">&#10005;</text>

  <rect x="327" y="480" width="227" height="44" rx="22" fill="#FADBD5" stroke="#D73027" stroke-width="1.3"/>
  <text x="440" y="507" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#D73027">Module page: "Critical: 105"</text>

  <text x="48" y="562" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#374151">Caught in prototype review &#8594; fixed structurally: no component computes its own numbers. Tests pin it.</text>

  <!-- ================= RIGHT: COLOUR CONTRACT ================= -->
  <text x="870" y="148" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">The colour contract</text>

  <rect x="870" y="200" width="150" height="84" rx="10" fill="#D73027"/>
  <text x="1048" y="250" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1F2937">needs action</text>

  <rect x="870" y="332" width="150" height="84" rx="10" fill="#D97706"/>
  <text x="1048" y="382" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1F2937">watch</text>

  <rect x="870" y="464" width="150" height="84" rx="10" fill="#1A9850"/>
  <text x="1048" y="514" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1F2937">fine</text>

  <text x="870" y="588" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#1F2937">Same meaning everywhere — tiles, map, clusters, chips, badges. No decorative red.</text>

  <rect x="870" y="606" width="16" height="16" rx="4" fill="#9CA3AF"/>
  <text x="894" y="619" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6B7280">Grey = no data.</text>

  <text x="48" y="704" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">Contracts — ADAFSA dashboard redesign</text>
</svg>
