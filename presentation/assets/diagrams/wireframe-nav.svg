<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="softShadowN" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1F2937" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#FAF9F6"/>

  <!-- ============ APP FRAME ============ -->
  <rect x="180" y="140" width="680" height="620" rx="14" fill="#FFFFFF" stroke="#E2E0DA" stroke-width="1.5" filter="url(#softShadowN)"/>

  <!-- nav / main divider -->
  <line x1="410" y1="140" x2="410" y2="760" stroke="#E2E0DA" stroke-width="1"/>

  <!-- logo -->
  <circle cx="208" cy="176" r="8" fill="#166534"/>
  <rect x="228" y="168" width="90" height="16" rx="4" fill="#D9DEDA"/>
  <line x1="180" y1="200" x2="410" y2="200" stroke="#E2E0DA" stroke-width="1"/>

  <!-- Overview (highlighted) -->
  <rect x="200" y="216" width="190" height="40" rx="8" fill="#EAF3EC"/>
  <text x="216" y="242" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#1F2937">Overview</text>

  <!-- MODULES section -->
  <text x="200" y="312" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#9CA3AF">MODULES</text>
  <text x="200" y="348" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#374151">Crop Monitoring</text>
  <text x="200" y="384" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#374151">Palms &amp; Fruit Trees</text>
  <text x="200" y="420" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#374151">Land Use &amp; Structures</text>
  <text x="200" y="456" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#374151">Irrigation Efficiency</text>
  <text x="200" y="492" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#374151">Yield Forecast</text>
  <text x="200" y="528" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#374151">Water Allocation</text>

  <!-- DRILL-DOWN section -->
  <text x="200" y="584" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#9CA3AF">DRILL-DOWN</text>
  <text x="200" y="620" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#374151">Farm Analysis</text>

  <!-- faded main area placeholders -->
  <rect x="430" y="164" width="410" height="24" rx="4" fill="#F0EFEA"/>
  <rect x="430" y="204" width="410" height="520" rx="8" fill="#F2F1ED" stroke="#E2E0DA" stroke-width="1"/>

  <!-- ============ CONNECTORS (modern style) ============ -->
  <!-- connector 1: Overview -->
  <line x1="400" y1="236" x2="940" y2="185" stroke="#AEB4BC" stroke-width="1.25"/>
  <circle cx="400" cy="236" r="5.5" fill="#166534"/>
  <circle cx="400" cy="236" r="2" fill="#FFFFFF"/>

  <!-- connector 2: bracket spanning six modules -->
  <path d="M 420 334 L 408 334 M 420 334 L 420 542 M 420 542 L 408 542" fill="none" stroke="#AEB4BC" stroke-width="1.25"/>
  <line x1="420" y1="438" x2="940" y2="450" stroke="#AEB4BC" stroke-width="1.25"/>
  <circle cx="420" cy="438" r="5.5" fill="#166534"/>
  <circle cx="420" cy="438" r="2" fill="#FFFFFF"/>

  <!-- connector 3: Farm Analysis -->
  <line x1="400" y1="614" x2="940" y2="715" stroke="#AEB4BC" stroke-width="1.25"/>
  <circle cx="400" cy="614" r="5.5" fill="#166534"/>
  <circle cx="400" cy="614" r="2" fill="#FFFFFF"/>

  <!-- ============ RIGHT CHIPS (new tile-icon set, scaled to 52px) ============ -->
  <!-- chip 1: region / area glyph -->
  <g transform="translate(940,159) scale(0.68421)">
    <rect width="76" height="76" rx="18" fill="#EAF3EC"/>
    <path d="M19 26 L33 22 L47 26 L57 22 L57 54 L47 50 L33 54 L19 50 Z" fill="none" stroke="#166534" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/><line x1="33" y1="22" x2="33" y2="54" stroke="#166534" stroke-width="2" stroke-linecap="round"/><line x1="47" y1="26" x2="47" y2="50" stroke="#166534" stroke-width="2" stroke-linecap="round"/><circle cx="41" cy="38" r="2.6" fill="#166534"/>
  </g>
  <text x="1012" y="192" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1F2937">Depth 1 — the situation</text>

  <!-- chip 2: magnifier over ranked bars -->
  <g transform="translate(940,424) scale(0.68421)">
    <rect width="76" height="76" rx="18" fill="#EAF3EC"/>
    <circle cx="32" cy="30" r="14" fill="none" stroke="#166534" stroke-width="2.5"/>
    <line x1="24" y1="25" x2="40" y2="25" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/><line x1="24" y1="30" x2="36" y2="30" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/><line x1="24" y1="35" x2="31" y2="35" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="42" y1="40" x2="54" y2="54" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="1012" y="457" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1F2937">Depth 2 — the question</text>

  <!-- chip 3: location pin -->
  <g transform="translate(940,689) scale(0.68421)">
    <rect width="76" height="76" rx="18" fill="#EAF3EC"/>
    <g transform="translate(14,12) scale(2)">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="none" stroke="#166534" stroke-width="1.25" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="12" cy="9" r="2.6" fill="none" stroke="#166534" stroke-width="1.25"/>
    </g>
  </g>
  <text x="1012" y="722" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1F2937">Depth 3 — the farm</text>

  <text x="800" y="820" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6B7280">Each entry in the menu answers at one depth.</text>
</svg>
